[package]
name = "cc-essentials"
version = "0.1.0"
edition = "2021"
description = "Claude Code essentials: doctor and post-tool formatting hook"
license = "MIT"

[dependencies]
clap = { version = "4", features = ["derive"] }
anyhow = "1"

[dev-dependencies]
assert_cmd = "2"
predicates = "3"

[profile.release]
lto = "thin"
strip = "symbols"
